name: Telegram Study Reminder

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min — sends reminder if session starts soon
    - cron: '30 0 * * *'     # 6:00 AM IST (00:30 UTC) — sends full day agenda
  workflow_dispatch:           # manual trigger — sends agenda immediately

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run reminder (scheduled every 10 min)
        if: github.event_name == 'schedule'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python telegram_reminder.py

      - name: Send agenda (manual trigger = test)
        if: github.event_name == 'workflow_dispatch'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python telegram_reminder.py agenda
