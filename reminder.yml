name: Telegram Study Reminder

on:
  schedule:
    - cron: '*/10 * * * *'
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Telegram - Send agenda (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python telegram_reminder.py agenda

      - name: Telegram - Check reminder (scheduled)
        if: github.event_name == 'schedule'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python telegram_reminder.py

      - name: WhatsApp - Send agenda (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          WA_PHONE_ID: ${{ secrets.WA_PHONE_ID }}
          WA_TOKEN: ${{ secrets.WA_TOKEN }}
        run: python whatsapp_reminder.py agenda

      - name: WhatsApp - Check reminder (scheduled)
        if: github.event_name == 'schedule'
        env:
          WA_PHONE_ID: ${{ secrets.WA_PHONE_ID }}
          WA_TOKEN: ${{ secrets.WA_TOKEN }}
        run: python whatsapp_reminder.py
